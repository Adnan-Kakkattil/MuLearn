name: CI-CD Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JavaScript syntax
        run: |
          node --check scripts/index.js
          node --check scripts/about.js
          node --check scripts/career.js
          node --check scripts/contact.js

      - name: Validate required site files
        run: |
          test -f index.html
          test -f about.html
          test -f career.html
          test -f contact.html
          test -f logo31.png

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      EC2_PORT: ${{ vars.EC2_PORT }}
      EC2_DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          : "${EC2_HOST:?Missing secret EC2_HOST}"
          : "${EC2_USER:?Missing secret EC2_USER}"
          : "${EC2_SSH_PRIVATE_KEY:?Missing secret EC2_SSH_PRIVATE_KEY}"

          PORT="${EC2_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "${EC2_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" -H "${EC2_HOST}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy website files to EC2
        run: |
          set -euo pipefail
          PORT="${EC2_PORT:-22}"
          DEPLOY_PATH="${EC2_DEPLOY_PATH:-/var/www/mulearn}"

          ssh -i ~/.ssh/id_ed25519 -p "${PORT}" "${EC2_USER}@${EC2_HOST}" "mkdir -p '${DEPLOY_PATH}'"

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "deploy/" \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${PORT}" \
            ./ "${EC2_USER}@${EC2_HOST}:${DEPLOY_PATH}/"

      - name: Verify deployment on EC2
        run: |
          set -euo pipefail
          PORT="${EC2_PORT:-22}"
          DEPLOY_PATH="${EC2_DEPLOY_PATH:-/var/www/mulearn}"
          ssh -i ~/.ssh/id_ed25519 -p "${PORT}" "${EC2_USER}@${EC2_HOST}" \
            "test -f '${DEPLOY_PATH}/index.html' && echo 'Deployment complete: ${DEPLOY_PATH}'"
